[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/v1/auth/linkedin/start"
  to = "/.netlify/functions/linkedin-start"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/auth/linkedin/callback"
  to = "/.netlify/functions/linkedin-callback"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/auth/session"
  to = "/.netlify/functions/auth-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/auth/facebook/start"
  to = "/.netlify/functions/facebook-start"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/auth/facebook/callback"
  to = "/.netlify/functions/facebook-callback"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/auth/whatsapp/challenges"
  to = "/.netlify/functions/whatsapp-challenge"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/auth/whatsapp/verify"
  to = "/.netlify/functions/whatsapp-verify"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/profile/imports/linkedin"
  to = "/.netlify/functions/linkedin-profile-import"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/referrals/links"
  to = "/.netlify/functions/referral-links"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/referrals/events"
  to = "/.netlify/functions/referral-events"
  status = 200
  force = true

[[redirects]]
  from = "/r/:token"
  to = "/.netlify/functions/referral-capture?token=:token"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/api-gateway?path=:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-origin"
    Permissions-Policy = "camera=(), geolocation=(self), microphone=(self), payment=(), usb=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
