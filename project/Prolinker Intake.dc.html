        this.setState({ theme: 'dark' });
      }
    } catch (e) {}
  }

    const next = this.state.theme === 'dark' ? 'light' : 'dark';

      else document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('plk-theme', next);
    } catch (e) {}
    this.setState({ theme: next });

    const phrases = this.phrases();
    let p = 0, c = 0, deleting = false;
    const tick = () => {
      const cur = phrases[p];
      if (!deleting) {
        c++;
        if (c >= cur.length) {
          deleting = true;
          this.setState({ anim: cur });
          this._typeTimer = setTimeout(tick, 1700);
          return;
        }
      } else {
        c -= 2;
        if (c <= 0) { c = 0; deleting = false; p = (p + 1) % phrases.length; }
      }
      this.setState({ anim: phrases[p].slice(0, Math.max(0, c)) });
      this._typeTimer = setTimeout(tick, deleting ? 24 : 52);
    };

  }

    const w = window.innerWidth;

    if (w < 560) cols = 1;

    else cols = 4;
    if (cols !== this.state.cols) this.setState({ cols });

    let h = (hex || '#006BC6').replace('#', '');
    if (h.length === 3) h = h.split('').map((c) => c + c).join('');

    return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';

  micSupported() {
    return !!(window.SpeechRecognition || window.webkitSpeechRecognition);

  ensureRecog() {
    if (this._recog || this._recogFailed) return this._recog;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { this._recogFailed = true; return null; }
    const r = new SR();
    r.interimResults = true;
    r.continuous = false;
    r.onresult = (e) => {
      let s = '';
      for (let i = 0; i < e.results.length; i++) s += e.results[i][0].transcript;
      const base = this._micBase ? this._micBase + ' ' : '';
      this.setState({ text: base + s, touched: true });
    };
    r.onend = () => this.setState({ listening: false });
    r.onerror = () => this.setState({ listening: false });
    this._recog = r;
    return r;
  }
  toggleMic() {
    const r = this.ensureRecog();
    if (!r) return;
    if (this.state.listening) { try { r.stop(); } catch (e) {} return; }
    this._micBase = (this.state.text || '').trim();
    r.lang = this.lang() === 'nl' ? 'nl-NL' : 'en-US';
    try { r.start(); this.setState({ listening: true, focused: true }); } catch (e) {}
  }

        { label: 'Bookkeeping' },
        { label: 'Financial Modeling' },
        { label: 'Tax Preparation' },
        { label: 'Payroll' },
        { label: 'Accounting' },
        { label: 'Investor Reporting' },
        { label: 'Budgeting' },
        { label: 'Cash Flow Forecasting' },
        { label: 'QuickBooks' },
        { label: 'Business Valuation' },
        { label: 'Auditing' },
        { label: 'VAT & Sales Tax' },
        { label: 'Expense Tracking' },
        { label: 'Fundraising Decks' },
        { label: 'P&L Statements' },
        { label: 'Due Diligence' },
        { label: 'KPI Dashboards' },
        { label: 'Financial Planning' },
      ],
      'Legal': [
        { label: 'Contract Drafting' },
        { label: 'NDA Review' },
        { label: 'Trademark Registration' },
        { label: 'Privacy Policy' },
        { label: 'GDPR Compliance' },
        { label: 'Company Incorporation' },
        { label: 'Patent Filing' },
        { label: 'Copyright Registration' },
        { label: 'Employment Law' },
        { label: 'IP Protection' },
        { label: 'Terms of Service' },
        { label: 'Lease Agreements' },
        { label: 'Founders Agreements' },
        { label: 'Shareholder Agreements' },
        { label: 'Business Licensing' },
        { label: 'Demand Letters' },
        { label: 'Immigration Paperwork' },
        { label: 'Refund Policies' },
      ],
      'Admin': [
        { label: 'Virtual Assistant' },
        { label: 'Data Entry' },
        { label: 'Transcription' },
        { label: 'Customer Support' },
        { label: 'Internet Research' },
        { label: 'Calendar Management' },
        { label: 'Notion Setup' },
        { label: 'Live Chat Support' },
        { label: 'Event Planning' },
        { label: 'Proofreading' },
        { label: 'Spreadsheet Dashboards' },
        { label: 'Order Fulfillment' },
        { label: 'Travel Coordination' },
        { label: 'Invoicing' },
        { label: 'File Conversion' },
        { label: 'Community Moderation' },
        { label: 'Document Formatting' },
        { label: 'Email Management' },
      ],
    };
    const category = this.props.jobCategory || 'All';
    const pool = category === 'All'
      ? Object.keys(catalog).reduce((acc, k) => acc.concat(catalog[k]), [])
      : (catalog[category] || []);
    const step = 15;
    const shownCount = this.state.shownCount || step;
    const visible = pool.slice(0, Math.min(shownCount, pool.length));
    const remaining = pool.length - visible.length;
    const canExpand = remaining > 0;
    const nextReveal = Math.min(step, remaining);
    const showExpandBtn = pool.length > step;
    const t = this.strings();
    const suggestions = visible.map((s) => {
      const label = this.tLabel(s.label);
      return {
        label: label,
        iconEl: this.iconEl(s.label, accent),
        pick: () => this.setState({ text: label, focused: true, touched: true }),
      };
    });

    return {
      text,
      accent,
      accentShadow,
      accentTint,
      firstName,
      initials,
      t,
      micShow: this.micSupported(),
      micBg: this.state.listening ? accentTint : 'transparent',
      micColor: this.state.listening ? accent : '#8A8D99',
      micPulse: this.state.listening ? 'plk-pulse 1.3s infinite' : 'none',
      onToggleMic: () => this.toggleMic(),
      charsLeft: (max - text.length).toLocaleString(),
      animPlaceholder: (this.state.text || this.state.focused) ? '' : (this.state.anim + '▏'),
      counterColor: text.length > max * 0.9 ? '#D92D20' : '#A2A5B2',
      errors,
      showErrors: hasError,
      borderColor,
      boxShadow,
      suggestions,
      isDark: this.state.theme === 'dark',
      isLight: this.state.theme !== 'dark',
      logoFilter: this.state.theme === 'dark' ? 'brightness(0) invert(1)' : 'none',
      nameColor: this.state.theme === 'dark' ? '#ffffff' : accent,
      fontStack: ({
        'Schibsted Grotesk': "'Schibsted Grotesk', system-ui, sans-serif",
        'Geist': "'Geist', system-ui, sans-serif",
        'General Sans': "'General Sans', system-ui, sans-serif",
      })[this.props.fontPairing] || "'Schibsted Grotesk', system-ui, sans-serif",
      onToggleTheme: () => this.toggleTheme(),
      showExpandBtn,
      expandLabel: canExpand ? t.showMore(nextReveal) : t.showLess,
      arrowTransform: canExpand ? 'rotate(0deg)' : 'rotate(180deg)',
      onToggleExpand: () => this.setState((s) => {
        const cur = s.shownCount || step;
        return canExpand ? { shownCount: cur + step } : { shownCount: step };
      }),
      continueOpacity: valid ? 1 : 0.4,
      continueCursor: valid ? 'pointer' : 'not-allowed',
      onInput: (e) => this.setState({ text: e.target.value, touched: true }),
      onKeyDown: (e) => { if (e.key === 'Enter') { e.preventDefault(); if (valid) this.setState({ touched: true }); } },
      onFocus: () => this.setState({ focused: true }),
      onBlur: () => this.setState({ focused: false }),
      onContinue: () => { if (valid) this.setState({ touched: true }); },
    };
  }
}
</script>
</body>
