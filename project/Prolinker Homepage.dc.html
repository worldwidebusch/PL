<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860},&quot;jobCategory&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;All&quot;,&quot;Design&quot;,&quot;IT &amp; Development&quot;,&quot;Marketing&quot;,&quot;Sales&quot;,&quot;Finance&quot;,&quot;Legal&quot;,&quot;Admin&quot;],&quot;default&quot;:&quot;All&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;userName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;fontPairing&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Schibsted Grotesk&quot;,&quot;Geist&quot;,&quot;General Sans&quot;],&quot;default&quot;:&quot;Geist&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Brand&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#006BC6&quot;,&quot;options&quot;:[&quot;#006BC6&quot;,&quot;#152431&quot;,&quot;#0E7C66&quot;,&quot;#C2410C&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Brand&quot;}}">
class Component extends DCLogic {
  state = { text: '', focused: false, touched: false, cols: 4, rowsShown: 3, shownCount: 15, anim: '', listening: false, theme: 'light', menuOpen: false, authenticated: false, authRole: null, authName: '' };

  isValidWhatsappSession(session, requiredRole) {
    if (!session || session.authenticated !== true || session.channel !== 'whatsapp') return false;
    if (requiredRole && session.role !== requiredRole) return false;
    const contact = typeof session.contact === 'string' ? session.contact.trim() : '';
    if (!contact || !/^\+?[\d\s().-]+$/.test(contact)) return false;
    return (contact.match(/\d/g) || []).length >= 8;
  }

  componentDidMount() {
    this.updateCols();
    this._onResize = () => this.updateCols();
    window.addEventListener('resize', this._onResize);
    this.startTyping();
    try {
      document.documentElement.setAttribute('lang', this.lang());
      if (localStorage.getItem('plk-theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        this.setState({ theme: 'dark' });
      }
      const rawSession = localStorage.getItem('plk-auth-session');
      const session = rawSession ? JSON.parse(rawSession) : null;
      if (this.isValidWhatsappSession(session) && (session.role === 'client' || session.role === 'freelancer')) this.setState({ authenticated: true, authRole: session.role, authName: String(session.name || localStorage.getItem('plk-user-name') || '').trim() });
    } catch (e) {}
    this._onKey = (e) => { if (e.key === 'Escape' && this.state.menuOpen) this.closeMenu(); };
    window.addEventListener('keydown', this._onKey);
  }
  toggleMenu() { this.setState((s) => ({ menuOpen: !s.menuOpen })); }
  closeMenu() { this.setState({ menuOpen: false }); }
  toggleTheme() {
    const next = this.state.theme === 'dark' ? 'light' : 'dark';
    try {
      if (next === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      else document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('plk-theme', next);
    } catch (e) {}
    this.setState({ theme: next });
  }
  componentWillUnmount() {
    if (this._onResize) window.removeEventListener('resize', this._onResize);
    if (this._onKey) window.removeEventListener('keydown', this._onKey);
    clearTimeout(this._typeTimer);
    if (this._recog) { try { this._recog.stop(); } catch (e) {} }
  }
  startTyping() {
    const phrases = this.phrases();
    let p = 0, c = 0, deleting = false;
    const tick = () => {
      if (this.state.focused || (this.state.text || '').length) { this._typeTimer = setTimeout(tick, 500); return; }
      const cur = phrases[p];
      if (!deleting) {
        c++;
        if (c >= cur.length) {
          deleting = true;
          this.setState({ anim: cur });
          this._typeTimer = setTimeout(tick, 1700);
          return;
        }
      } else {
        c -= 2;
        if (c <= 0) { c = 0; deleting = false; p = (p + 1) % phrases.length; }

    r.onend = () => this.setState({ listening: false });
    r.onerror = () => this.setState({ listening: false });

    return r;
