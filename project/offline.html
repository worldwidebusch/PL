<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#152431">
    <title>Offline | ProLinker</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Lato', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #152431;
        background: #F3F4F6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        background:
          radial-gradient(circle at 50% 0, rgba(28, 155, 222, 0.18), transparent 42%),
          #F3F4F6;
      }

      main {
        width: min(100%, 480px);
        padding: clamp(28px, 8vw, 48px);
        text-align: center;
        background: #ffffff;
        border: 1px solid rgba(16, 37, 50, 0.1);
        border-radius: 24px;
        box-shadow: 0 24px 70px rgba(16, 37, 50, 0.12);
      }

      img {
        display: block;
        width: 88px;
        height: 88px;
        margin: 0 auto 24px;
        border-radius: 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.75rem, 7vw, 2.5rem);
        line-height: 1.08;
      }

      p {
        margin: 0 auto;
        color: #526773;
        font-size: 1rem;
        line-height: 1.65;
      }

      .actions {
        display: grid;
        gap: 12px;
        margin-top: 28px;
      }

      button,
      a {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        border-radius: 12px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      button {
        color: #ffffff;
        background: #087fc0;
        border: 1px solid #087fc0;
      }

      button:hover,
      button:focus-visible {
        background: #056ca4;
      }

      a {
        color: #152431;
        background: transparent;
        border: 1px solid rgba(16, 37, 50, 0.2);
      }

      button:focus-visible,
      a:focus-visible {
        outline: 3px solid rgba(8, 127, 192, 0.32);
        outline-offset: 3px;
      }

      #status {
        min-height: 24px;
        margin-top: 18px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="assets/pwa/icon-192.png" alt="">
      <h1>Je bent offline</h1>
      <p>Controleer je internetverbinding. Pagina's die je al hebt bezocht, kunnen beschikbaar zijn zodra je opnieuw probeert.</p>
      <div class="actions">
        <button id="retry" type="button">Opnieuw proberen</button>
        <a href="Prolinker Homepage.dc.html">Naar de homepage</a>
      </div>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script>
      const status = document.getElementById("status");

      document.getElementById("retry").addEventListener("click", () => {
        status.textContent = "Verbinding controleren...";
        window.location.reload();
      });

      window.addEventListener("online", () => {
        status.textContent = "Je bent weer online. Probeer het opnieuw.";
      });
    </script>
  </body>
</html>
